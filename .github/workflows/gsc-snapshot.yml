name: Weekly GSC snapshot

on:
  schedule:
    - cron: "0 12 * * 1"   # Monday 12:00 UTC (~7am ET)
  workflow_dispatch: {}    # Allow manual triggering from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot endpoint
        run: |
          curl --fail-with-body --max-time 60 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://leasey-content-web.onrender.com/api/cron/snapshot?days=28"
