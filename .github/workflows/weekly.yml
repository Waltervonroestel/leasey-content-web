name: Weekly fresh-data refresh

# Cada lunes a las 10:00 UTC dispara el refresh automatico de insights, PM outlets y subreddits.
# Render free no permite cron, asi que lo corremos desde GitHub Actions (igual que FastStrat).
on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST "$APP_BASE_URL/api/cron" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail
