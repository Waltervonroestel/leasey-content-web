# Render blueprint para Leasey Content Dashboard (servicio web Next.js).
# Las variables de entorno (GOOGLE_*, CALENDAR_SHEET_ID, OPTIMISATION_SHEET_ID,
# GSC_SITE_URL) se configuran en el dashboard de Render. Sin contraseña: acceso abierto.
services:
  - type: web
    name: leasey-content-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
